name: Compatibility

on:
  workflow_dispatch:

jobs:
  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jmeter: ["5.4.3", "5.5", "5.6.3"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: cd packages/java-bridge && gradle test
      - run: mkdir -p compatibility && printf '{"jmeter":"%s","status":"configured"}\n' '${{ matrix.jmeter }}' > compatibility/jmeter-${{ matrix.jmeter }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: compatibility-jmeter-${{ matrix.jmeter }}
          path: compatibility/jmeter-${{ matrix.jmeter }}.json
